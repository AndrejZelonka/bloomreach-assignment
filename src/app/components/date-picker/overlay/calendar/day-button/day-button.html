<button
  type="button"
  class="day-btn"
  [class.is-today]="isToday()"
  [class.is-start]="isStart()"
  [class.is-end]="isEnd()"
  [class.is-in-range]="isInRange()"
  [class.is-hover-preview-in-range]="isHoverPreviewInRange()"
  [class.is-hover-preview-endpoint]="isHoverPreviewEndpoint()"
  [attr.aria-label]="ariaLabel()"
  [disabled]="disabled() || null"
  (click)="clicked.emit()"
>
  <ng-content />
</button>
