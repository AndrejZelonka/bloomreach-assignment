<div class="trigger">
  <app-label [label]="label()" />
  <app-input
    [value]="''"
    placeholder="mm/dd/yyyy"
    [readOnly]="true"
    [leadingIcon]="'calendar'"
    [trailingIcon]="'chevron-down'"
    (click)="onToggle()"
  />
</div>

@if (isOpen()) {
  <date-picker-overlay role="dialog" aria-label="Date picker" aria-modal="true" />
}
