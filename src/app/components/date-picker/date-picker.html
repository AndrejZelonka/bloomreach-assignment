<div class="trigger">
  <app-label [label]="label()" />
  <app-input
    [value]="formattedRange() ?? ''"
    placeholder="mm/dd/yyyy"
    [readOnly]="true"
    [leadingIcon]="'calendar'"
    [trailingIcon]="'chevron-down'"
    (click)="onToggle()"
  />
</div>

@if (isOpen()) {
  <date-picker-overlay
    [committedRange]="committedRange()"
    [presets]="effectivePresets()"
    [allowCustomRangePreset]="allowCustomRangePreset()"
    (cancel)="onCancel()"
    (apply)="onApply($event)"
  />
}
